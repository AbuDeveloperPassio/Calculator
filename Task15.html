<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 300px;
        }

        input {
            width: 70%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        button.add {
            padding: 8px 10px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 5px;
        }

        button.add:hover {
            background: #45a049;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        li {
            background: #f9f9f9;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete {
            background: #ff4d4d;
            border: none;
            color: white;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete:hover {
            background: #e60000;
        }
    </style>
</head>

<body>

    <h1>My Todo App</h1>

    <div class="container">
        <input type="text" id="data" placeholder="Enter task...">
        <button class="add">Save</button>

        <ul id="list"></ul>
    </div>

    <script>
        const btn = document.querySelector('.add');
        const input = document.getElementById('data');
        const list = document.getElementById('list');

        let storage = JSON.parse(localStorage.getItem('Name')) || [];

        storage.forEach(item => createItem(item.data));

        btn.addEventListener('click', () => {
            const text = input.value.trim();
            if (!text) return;

            const item = { data: text };
            storage.push(item);

            localStorage.setItem('Name', JSON.stringify(storage));

            createItem(text);

            input.value = '';
        });

        function createItem(text) {
            const li = document.createElement('li');
            const delBtn = document.createElement('button');

            li.textContent = text;

            delBtn.textContent = 'Delete';
            delBtn.classList.add('delete');

            li.append(delBtn);
            list.append(li);

            delBtn.addEventListener('click', () => {
                const li = delBtn.parentElement;
                const textToDelete = li.firstChild.textContent.trim(); 

                let checkForDel = JSON.parse(localStorage.getItem('Name')) || [];

                checkForDel = checkForDel.filter(item => item.data !== textToDelete);

                localStorage.setItem('Name', JSON.stringify(checkForDel));

                li.remove();
            });
        }
    </script>

</body>

</html>
