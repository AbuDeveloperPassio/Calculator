<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <img src="https://picsum.photos/id/10/400/300">
    <button id="btn">Change source</button>

    <script>
        let btn = document.getElementById('btn');
        let img = document.querySelector('img');

        btn.addEventListener('click', ()=>{

            img.src = "https://picsum.photos/id/20/400/300";

        })
    </script>
   
    
</body>
</html>
