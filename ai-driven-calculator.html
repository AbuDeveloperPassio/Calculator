
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Calculator UI</title>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="w-80 bg-white border border-gray-200 rounded-xl shadow-md p-4">

        <!-- Display -->
        <input type="text" placeholder="0" disabled id="Display"
            class="w-full h-16 text-right text-3xl px-3 border border-gray-200 rounded-lg mb-4 outline-none" />

        <!-- Buttons -->
        <div class="grid grid-cols-4 gap-2 main-container">

            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn op">*</button>

            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn op">-</button>

            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn op">+</button>

            <button class="btn">0</button>
            <button class="btn">.</button>
            <input class="btn equal" type="submit" value="=" id="operation">
            <button class="btn op">/</button>

            <button class="btn action col-span-4" id="clear">C</button>
        </div>

        <button id="showHis"
            class="px-1 text-sm py-1 bg-white/70 backdrop-blur border border-gray-200 rounded-xl shadow hover:shadow-lg transition">
            📜 View History
        </button>

        <div class="hidden" id="dataHis">
            <h1>History so far</h1>
            <div id="storingHis"></div>
        </div>
    </div>

    <script>
        // ---------- DOM references ----------
        const main = document.querySelector('.main-container');
        const eachButton = main.querySelectorAll('button');
        const inputBox = document.getElementById('Display');
        const operation = document.getElementById('operation');
        const clear = document.getElementById('clear');
        const storingHis = document.getElementById('storingHis');
        const showHis = document.getElementById('showHis');
        const dataHis = document.getElementById('dataHis');

        // ---------- State ----------
        let numbers = JSON.parse(localStorage.getItem('Calculations')) || [];
        let justCalculated = false; // tracks whether "=" was just pressed

        // ---------- Storage ----------
        function saveToLocal() {
            localStorage.setItem('Calculations', JSON.stringify(numbers));
        }

        // ---------- History rendering ----------
        function dispaly() {
            storingHis.innerHTML = ''; // clear before rebuilding, or entries duplicate
            numbers.forEach(number => {
                storingHis.innerHTML += `
                    <div class="flex items-center justify-between gap-2 py-1">
                        <p>${number}</p>
                        <button class="delBtn px-3 py-1.5 bg-red-500
                        text-white text-sm font-medium rounded-lg hover:bg-red-600
                        active:bg-red-700 transition">Delete</button>
                    </div>
                `;
            });
        }

        // ---------- Calculator logic ----------
        // Handles mixed operators (5+3*2) correctly by respecting normal math precedence,
        // instead of splitting on just one operator like before.
        function calculate(expression) {
            // only allow digits, ., and + - * / — blocks anything unsafe
            if (!/^[0-9+\-*/.]+$/.test(expression)) {
                return 'Error';
            }
            try {
                let result = Function('"use strict"; return (' + expression + ')')();
                if (!isFinite(result)) return 'Error'; // catches divide by zero (Infinity/NaN)
                return result;
            } catch {
                return 'Error';
            }
        }

        // ---------- Event listeners ----------
        eachButton.forEach(button => {
            button.addEventListener('click', (e) => {
                // after "=", digits start a fresh number, but operators continue the chain
                if (justCalculated) {
                    if (!e.target.classList.contains('op')) {
                        inputBox.value = '';
                    }
                    justCalculated = false;
                }
                inputBox.value += e.target.textContent;
            });
        });

        operation.addEventListener('click', () => {
            if (inputBox.value === '' || inputBox.value === 'Error') return;

            let result = calculate(inputBox.value);
            numbers.push(`${inputBox.value} = ${result}`);
            saveToLocal();
            inputBox.value = result;
            justCalculated = true;
            dispaly();
        });

        clear.addEventListener('click', () => {
            inputBox.value = '';
            justCalculated = false;
        });

        showHis.addEventListener('click', () => {
            dataHis.classList.remove('hidden');
        });

        // delegated delete handler — deletes by position, so duplicate entries
        // (e.g. two identical "9+3" rows) no longer both get removed
        storingHis.addEventListener('click', (e) => {
            if (e.target.classList.contains('delBtn')) {
                let index = Array.from(storingHis.children).indexOf(e.target.parentElement);
                numbers.splice(index, 1);
                saveToLocal();
                dispaly();
            }
        });

        window.addEventListener('load', () => {
            dispaly();
        });
    </script>

</body>

</html>
