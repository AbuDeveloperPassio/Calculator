<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #main-box {
            display: flex;
            flex-wrap: wrap;
            column-gap: 20px;
            justify-content: space-around;

        }

        .element {
            line-height: 30px;
            border: 1px solid black;
            width: 200px;
            margin-bottom: 10px;

        }

        .element h4 {
            color: red;
            background-color: orange;
            width: 60px;
            text-align: center;
            border-radius: 6px;
        }

        .element img {
            width: 100%;

        }

        input {
            width: 90%;
            margin-top: 20px;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 10px;
        }

        .input{
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div class="input">
        <input type="text" id="enteredText" placeholder="Enter somthing....">
    </div>

    <div id="main-box">
    </div>

    <script type="module" src="Task24.js"></script>
</body>

</html>
